<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Favicon de la invitación: corazón acuarela color cereza de café
       con hoja de cafeto, sobre un medallón de papel de lienzo. -->
  <defs>
    <linearGradient id="heartWash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c86a7a" />
      <stop offset="1" stop-color="#a93b4f" />
    </linearGradient>
    <filter id="paintEdge" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.16" numOctaves="2" seed="4" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.8" />
    </filter>
  </defs>

  <!-- Medallón de papel -->
  <path
    d="M32 2.5 C49.5 2 61.5 13.5 61.5 31.5 C61.5 49.5 50 61.5 32 61.5 C14.5 61.5 2.5 50 2.5 32 C2.5 14.5 14 3 32 2.5 Z"
    fill="#f6f1e4" stroke="#d3a86a" stroke-width="1.6" stroke-opacity="0.55"
  />

  <g filter="url(#paintEdge)">
    <!-- Corazón -->
    <path
      d="M32 53 C18 43 9.5 33.5 9.5 23.5 C9.5 15.5 15.5 10.5 22.5 10.5 C26.8 10.5 30.4 12.6 32 16.2 C33.6 12.6 37.2 10.5 41.5 10.5 C48.5 10.5 54.5 15.5 54.5 23.5 C54.5 33.5 46 43 32 53 Z"
      fill="url(#heartWash)"
    />
    <!-- Brillo de acuarela -->
    <ellipse cx="23" cy="20" rx="6.5" ry="4.5" fill="#ffffff" opacity="0.28" transform="rotate(-24 23 20)" />

    <!-- Tallo y hoja de cafeto -->
    <path d="M32 16 C34 12 36 10 39 8.5" stroke="#5d6e4c" stroke-width="1.8" fill="none" stroke-linecap="round" />
    <path d="M38 9 C40 3.5 47 1.5 52.5 4 C50 9.5 43.5 12 38 9 Z" fill="#6f7f55" />
  </g>
</svg>
